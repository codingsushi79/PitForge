<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>PitForge Link Setup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="logo-row">
      <div class="logo-icon">🔥</div>
      <h1>PitForge Link Setup</h1>
    </div>
    <p class="subtitle">A one-time setup — we&apos;ll connect PitForge to your game automatically.</p>

    <ol class="steps">
      <li><strong>Step 1</strong> — Point to your Le Mans Ultimate install folder</li>
      <li><strong>Step 2</strong> — We install and enable live telemetry for your game</li>
    </ol>

    <div class="field">
      <label>Le Mans Ultimate folder</label>
      <div class="input-row">
        <input type="text" id="lmuPath" placeholder="C:\Program Files (x86)\Steam\steamapps\common\Le Mans Ultimate" />
        <button class="btn btn-secondary" id="browseBtn">Browse</button>
      </div>
      <p class="hint">The folder that contains Le Mans Ultimate.exe</p>
    </div>

    <div id="progress" class="progress" style="display:none"></div>
    <div id="message"></div>
    <div id="pluginLog" class="plugin-log" style="display:none"></div>

    <button class="btn btn-primary btn-block btn-lg" id="installBtn" style="margin-top:16px">
      Finish setup
    </button>
  </div>
  <script src="setup.js"></script>
</body>
</html>
